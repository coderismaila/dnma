{% extends 'admin/base.html' %}{% block extrahead %}{{ block.super }}
<style>
    :root {
        --primary: #228B22;
        --secondary: #1e6e1e;

        --accent: #fafafa;
        --primary-fg: #fff;

        --body-fg: #333;
        --body-bg: #fff;
        --body-quiet-color: #666;
        --body-loud-color: #000;

        --header-color: #f3f3f3;
        --header-branding-color: var(--accent);
        --header-bg: var(--secondary);
        --header-link-color: var(--primary-fg);

        --breadcrumbs-fg: #fefefe;

        --link-fg: #1e6e1e;
        --link-hover-color: rgba(25, 135, 84, 0.5);
        --link-selected-fg: #1e6e1e;

        --message-success-bg: #dfd;
        --message-warning-bg: #ffc;
        --message-error-bg: #ffefef;

        --darkened-bg: #f8f8f8;
        /* A bit darker than --body-bg */
        --selected-bg: #e4e4e4;
        /* E.g. selected table cells */
        --selected-row: rgba(25, 135, 84, 0.1);

        --button-fg: #fff;
        --button-bg: var(--primary);
        --button-hover-bg: rgba(25, 135, 84, 0.5);
        --default-button-bg: var(--secondary);
        --default-button-hover-bg: rgba(25, 135, 84, 0.5);
        --close-button-bg: #747474;
        --close-button-hover-bg: #333;
    }

    /* LINKS */

    a:link,
    a:visited {
        color: var(--link-fg);
        text-decoration: none;
        transition: color 0.15s, background 0.15s;
    }

    a:focus,
    a:hover {
        color: var(--link-hover-color);
    }

    a:focus {
        text-decoration: underline;
    }

    a img {
        border: none;
    }

    a.section:link,
    a.section:visited {
        color: var(--header-link-color);
        text-decoration: none;
    }

    a.section:focus,
    a.section:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}
