{% load bootstrap5 %}

<div class="accordion mb-5" id="outageFilter">
    <div class="accordion-item">
        <h2 class="accordion-header" id="headingOne">
            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne"
                aria-expanded="true" aria-controls="collapseOne">
                Filter Outage
            </button>
        </h2>
        <div id="collapseOne" class="accordion-collapse collapse" aria-labelledby="headingOne"
            data-bs-parent="#outageFilter">
            <div class="accordion-body">
                <form method="get" class="form form-inline">
                    {{ filter.form.media }}
                    <div class="row">
                        {% for field in filter.form.visible_fields %}
                        <div class="col-sm-4">
                            <div class="form-group">
                                {% bootstrap_field field %}
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary"><span class="me-2"><i
                                    data-feather="search"></i></span>Filter Outage</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
