{% extends 'layouts/authentication.html' %}

{% block auth %}
<div class="container-xl px-4">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <!-- Basic login form-->
            <div class="card shadow-lg border-0 rounded-lg mt-5">
                <div class="card-header justify-content-center">
                    <h3 class="fw-light my-4">{% block auth-card-title %}Reset Password{% endblock %}</h3>
                </div>
                <div class="card-body">
                    {% block auth-card %}
                    {% endblock auth-card %}
                </div>
                <div class="card-footer text-center">
                    <div class="small"><a href="{% url 'home' %}">Go back to Homepage</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock auth %}
